# ── AI tools declaration ────────────────────────────────────────
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture discussion, scoring weight rationale, and
  code review. All engineering decisions (scoring pillars, weights, token
  sets, honeypot heuristics) were made by the human and tested against
  sample candidates. No candidate profile data was fed to any LLM.

# ── Methodology summary ─────────────────────────────────────────
methodology_summary: |
  Multi-signal rule-based ranker with five scoring pillars: technical skills
  (32%), career trajectory (28%), experience band (18%), behavioral availability
  (14%), and location fit (8%). Skill matching uses both the structured skills
  array (weighted by proficiency and duration) and free-text career descriptions,
  catching plain-language candidates who describe production retrieval work
  without buzzwords. Career scoring applies a hard gate against wrong titles
  (marketing managers with AI skills get ~0.04 career score) and a consulting
  ratio penalty for TCS/Infosys/Wipro/Accenture/Cognizant/Capgemini careers.
  Behavioral signals implement the JD's explicit note that a candidate
  inactive for 6+ months "is not actually available." Honeypot detection
  flags four impossible-profile patterns. Total runtime: ~60s on CPU.

